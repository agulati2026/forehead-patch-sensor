<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Temperature BLE</title>
    <style>
      :root {
        --bg: #0c0f14;
        --surface: #151a22;
        --text: #e8edf4;
        --muted: #8b98a8;
        --accent: #3b82f6;
        --danger: #f87171;
        --ok: #34d399;
        --warn: #fbbf24;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      main {
        max-width: 520px;
        margin: 0 auto;
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
      }
      .sub {
        color: var(--muted);
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
      }
      .panel {
        background: var(--surface);
        border-radius: 12px;
        padding: 1.25rem;
        margin-bottom: 1rem;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
      }
      button {
        font: inherit;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      button.secondary {
        background: #334155;
        color: var(--text);
      }
      .status {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--muted);
      }
      .dot[data-status='connected'] {
        background: var(--ok);
        box-shadow: 0 0 8px var(--ok);
      }
      .dot[data-status='connecting'],
      .dot[data-status='reconnecting'] {
        background: var(--warn);
        animation: pulse 1.2s ease-in-out infinite;
      }
      .dot[data-status='disconnected'],
      .dot[data-status='idle'] {
        background: var(--muted);
      }
      @keyframes pulse {
        50% {
          opacity: 0.45;
        }
      }
      .temp {
        font-size: 3.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        font-variant-numeric: tabular-nums;
      }
      .unit {
        font-size: 1.25rem;
        color: var(--muted);
        margin-left: 0.25rem;
      }
      canvas {
        display: block;
        width: 100%;
        height: 120px;
        border-radius: 8px;
        margin-top: 0.75rem;
      }
      #error-banner {
        background: rgba(248, 113, 113, 0.15);
        color: var(--danger);
        padding: 0.75rem 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        font-size: 0.875rem;
      }
      #raw-log {
        width: 100%;
        min-height: 120px;
        max-height: 200px;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.7rem;
        background: #0a0d11;
        color: #94a3b8;
        border: 1px solid #1e293b;
        border-radius: 8px;
        padding: 0.5rem;
        resize: vertical;
      }
      label.hint {
        display: block;
        font-size: 0.75rem;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      details.uuid-panel {
        margin-top: 1rem;
        font-size: 0.8125rem;
      }
      details.uuid-panel summary {
        cursor: pointer;
        color: var(--muted);
        user-select: none;
      }
      .uuid-grid {
        display: grid;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      .uuid-grid label {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        color: var(--muted);
        font-size: 0.7rem;
      }
      .uuid-grid input {
        font: inherit;
        padding: 0.4rem 0.5rem;
        border-radius: 6px;
        border: 1px solid #334155;
        background: #0f1419;
        color: var(--text);
        width: 100%;
      }
      .active-char {
        font-family: ui-monospace, monospace;
        font-size: 0.7rem;
        color: var(--ok);
        margin-top: 0.5rem;
        word-break: break-all;
      }
      .temp-line {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .temp-sub {
        font-size: 0.875rem;
        color: var(--muted);
        min-height: 1.25rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BLE temperature</h1>
      <p class="sub">NOTIFY-only · single device · reconnect without picker</p>

      <div id="error-banner" hidden></div>

      <div class="panel">
        <div class="row">
          <button type="button" id="btn-connect">Connect to Device</button>
          <button type="button" class="secondary" id="btn-disconnect" disabled>Disconnect</button>
        </div>
        <div class="status">
          <span class="dot" id="status-dot" data-status="idle"></span>
          <span id="status-text">Idle</span>
        </div>
        <p class="active-char" id="active-char" hidden></p>
        <details class="uuid-panel">
          <summary>Service &amp; characteristic UUIDs</summary>
          <div class="uuid-grid">
            <label>
              Service UUID
              <input type="text" id="uuid-service" spellcheck="false" autocomplete="off" />
            </label>
            <label>
              Characteristic UUID (optional — leave blank to auto-pick NOTIFY)
              <input type="text" id="uuid-char" spellcheck="false" autocomplete="off" placeholder="blank = auto" />
            </label>
          </div>
        </details>
      </div>

      <div class="panel">
        <label class="hint">Live temperature</label>
        <div class="temp-line">
          <div>
            <span class="temp" id="temp-value">—</span>
            <span class="unit" id="temp-unit">°C</span>
          </div>
          <div class="temp-sub" id="temp-sub"></div>
        </div>
        <label class="hint" style="margin-top: 1rem">Last 30 readings</label>
        <canvas id="temp-chart" width="480" height="120" aria-label="Temperature chart"></canvas>
      </div>

      <div class="panel">
        <label class="hint">Raw / debug log</label>
        <pre id="raw-log"></pre>
      </div>
    </main>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
