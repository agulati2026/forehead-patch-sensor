<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Temperature BLE</title>
    <style>
      :root {
        --bg: #0c0f14;
        --surface: #151a22;
        --text: #e8edf4;
        --muted: #8b98a8;
        --accent: #3b82f6;
        --danger: #f87171;
        --ok: #34d399;
        --warn: #fbbf24;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      main {
        max-width: 520px;
        margin: 0 auto;
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
      }
      .sub {
        color: var(--muted);
        font-size: 0.875rem;
        margin-bottom: 1.5rem;
      }
      .panel {
        background: var(--surface);
        border-radius: 12px;
        padding: 1.25rem;
        margin-bottom: 1rem;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
      }
      .row.toolbar {
        margin-top: 1rem;
        align-items: flex-end;
        justify-content: space-between;
      }
      button {
        font: inherit;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      button.secondary {
        background: #334155;
        color: var(--text);
      }
      button.unit-toggle {
        min-width: 3.25rem;
        font-weight: 600;
        padding: 0.45rem 0.65rem;
      }
      button.unit-toggle[aria-pressed='true'] {
        background: #2563eb;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--muted);
      }
      .dot[data-status='connected'] {
        background: var(--ok);
        box-shadow: 0 0 8px var(--ok);
      }
      .dot[data-status='connecting'],
      .dot[data-status='reconnecting'] {
        background: var(--warn);
        animation: pulse 1.2s ease-in-out infinite;
      }
      .dot[data-status='disconnected'],
      .dot[data-status='idle'] {
        background: var(--muted);
      }
      @keyframes pulse {
        50% {
          opacity: 0.45;
        }
      }
      .temp {
        font-size: 3.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        font-variant-numeric: tabular-nums;
      }
      .unit {
        font-size: 1.25rem;
        color: var(--muted);
        margin-left: 0.25rem;
      }
      canvas {
        display: block;
        width: 100%;
        height: 120px;
        border-radius: 8px;
        margin-top: 0.75rem;
      }
      #error-banner {
        background: rgba(248, 113, 113, 0.15);
        color: var(--danger);
        padding: 0.75rem 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        font-size: 0.875rem;
      }
      #info-banner {
        background: rgba(251, 191, 36, 0.12);
        color: #fcd34d;
        padding: 0.65rem 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        font-size: 0.8125rem;
      }
      #raw-log {
        width: 100%;
        min-height: 100px;
        max-height: 160px;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.65rem;
        background: #0a0d11;
        color: #94a3b8;
        border: 1px solid #1e293b;
        border-radius: 8px;
        padding: 0.5rem;
        resize: vertical;
      }
      label.hint {
        display: block;
        font-size: 0.75rem;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      details.more {
        margin-top: 0.75rem;
        font-size: 0.8125rem;
      }
      details.more summary {
        cursor: pointer;
        color: var(--muted);
        user-select: none;
      }
      .uuid-grid,
      .interval-field {
        display: grid;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      .interval-field label {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        color: var(--muted);
        font-size: 0.7rem;
      }
      .interval-field input {
        font: inherit;
        padding: 0.45rem 0.5rem;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f1419;
        color: var(--text);
        max-width: 8rem;
      }
      .interval-hint {
        font-size: 0.65rem;
        color: var(--muted);
        margin-top: 0.25rem;
      }
      .uuid-grid label {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        color: var(--muted);
        font-size: 0.7rem;
      }
      .uuid-grid input {
        font: inherit;
        padding: 0.4rem 0.5rem;
        border-radius: 6px;
        border: 1px solid #334155;
        background: #0f1419;
        color: var(--text);
        width: 100%;
      }
      .active-char {
        font-family: ui-monospace, monospace;
        font-size: 0.7rem;
        color: var(--ok);
        margin-top: 0.5rem;
        word-break: break-all;
      }
      .temp-line {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }
      .temp-sub {
        font-size: 0.875rem;
        color: var(--muted);
        min-height: 1.25rem;
      }
      .switch {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        font-size: 0.8125rem;
      }
      .switch input {
        width: 2.25rem;
        height: 1.25rem;
        accent-color: var(--accent);
        cursor: pointer;
      }
      #session-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        max-height: 180px;
        overflow-y: auto;
      }
      #session-list .session-empty {
        font-size: 0.8125rem;
        color: var(--muted);
        padding: 0.35rem 0;
      }
      button.session-item {
        width: 100%;
        text-align: left;
        background: #1e293b;
        font-size: 0.75rem;
        padding: 0.45rem 0.6rem;
        font-weight: 400;
      }
      button.session-item.is-active {
        outline: 2px solid var(--accent);
        background: #1e3a5f;
      }
      .session-form {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 0.65rem;
      }
      .session-form input {
        font: inherit;
        padding: 0.45rem 0.5rem;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f1419;
        color: var(--text);
      }
      .data-table-wrap {
        overflow-x: auto;
        max-height: 220px;
        overflow-y: auto;
        border: 1px solid #334155;
        border-radius: 8px;
        margin-top: 0.5rem;
      }
      table.data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.72rem;
      }
      table.data-table th,
      table.data-table td {
        padding: 0.35rem 0.45rem;
        text-align: left;
        border-bottom: 1px solid #1e293b;
      }
      table.data-table th {
        background: #0f1419;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      table.data-table .muted {
        color: var(--muted);
      }
      #session-viewer-title {
        font-size: 0.8125rem;
        font-weight: 600;
        margin: 0.75rem 0 0.25rem;
      }
      #active-session-label {
        font-size: 0.72rem;
        color: var(--ok);
        margin-top: 0.35rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BLE temperature</h1>
      <p class="sub">NOTIFY-only · stable link · sample when you choose</p>

      <div id="error-banner" hidden></div>
      <div id="info-banner" hidden></div>

      <div class="panel">
        <div class="row">
          <button type="button" id="btn-connect">Connect to Device</button>
          <button type="button" class="secondary" id="btn-disconnect" disabled>Disconnect</button>
        </div>
        <div class="status">
          <span class="dot" id="status-dot" data-status="idle"></span>
          <span id="status-text">Idle</span>
        </div>
        <p class="active-char" id="active-char" hidden></p>

        <div class="row toolbar">
          <div class="interval-field" style="margin-top: 0">
            <label for="interval-seconds">
              Sample every (seconds)
              <input
                type="number"
                id="interval-seconds"
                min="0.5"
                max="86400"
                step="any"
                value="5"
                inputmode="decimal"
                aria-describedby="interval-desc"
              />
            </label>
            <span id="interval-desc" class="interval-hint">Any value 0.5–86400 s (decimals OK). Does not reconnect BLE.</span>
          </div>
          <div class="row" style="gap: 0.5rem; align-items: center">
            <label class="switch">
              <input type="checkbox" id="stream-toggle" checked aria-label="Stream on" />
              <span>On</span>
            </label>
            <button type="button" class="unit-toggle" id="unit-toggle" aria-pressed="false">°C</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <label class="hint">Live temperature</label>
        <div class="temp-line">
          <div>
            <span class="temp" id="temp-value">—</span>
            <span class="unit" id="temp-unit">°C</span>
          </div>
          <div class="temp-sub" id="temp-sub"></div>
        </div>
        <label class="hint" style="margin-top: 1rem">Last 30 samples (°C)</label>
        <canvas id="temp-chart" width="480" height="120" aria-label="Temperature chart"></canvas>
      </div>

      <details class="more">
        <summary>Recording &amp; saved sessions</summary>
        <div class="uuid-grid" style="margin-top: 0.75rem">
          <label class="hint" style="margin-bottom: 0">Create a session to save interval samples (IndexedDB, this browser).</label>
          <div class="session-form">
            <input
              type="text"
              id="session-name-input"
              placeholder="Session name"
              maxlength="120"
              autocomplete="off"
            />
            <button type="button" id="btn-new-session">New session</button>
          </div>
          <p id="active-session-label" class="hint" style="color: var(--ok)"></p>
          <ul id="session-list"></ul>
          <p id="session-viewer-title">Readings</p>
          <div class="data-table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>°C</th>
                  <th>°F</th>
                </tr>
              </thead>
              <tbody id="session-table-body"></tbody>
            </table>
          </div>
        </div>
      </details>

      <details class="more">
        <summary>Advanced · BLE UUIDs &amp; debug log</summary>
        <div class="uuid-grid">
          <label>
            Service UUID
            <input type="text" id="uuid-service" spellcheck="false" autocomplete="off" />
          </label>
          <label>
            Characteristic UUID (blank = auto NOTIFY)
            <input type="text" id="uuid-char" spellcheck="false" autocomplete="off" placeholder="blank = auto" />
          </label>
        </div>
        <label class="hint" style="margin-top: 1rem">Debug log</label>
        <pre id="raw-log"></pre>
      </details>
    </main>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
